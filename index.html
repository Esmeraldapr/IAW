<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKCAT - Ultimate Tech Test</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #FF007F;
            --success: #238636;
            --error: #da3633;
            --border: #30363d;
            --theme-color: #58a6ff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }

        .header { text-align: center; margin-bottom: 30px; }

        .img-container {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .img-container img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid var(--theme-color);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            object-fit: cover;
            transition: border-color 0.4s;
        }

        /* Navegación por Temas */
        .nav-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            max-width: 1100px;
        }

        .nav-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 150px;
        }

        .nav-btn span { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; font-weight: 400; }

        /* Colores de pestañas */
        .tab-rosa.active { background: #f472b6 !important; border-color: #f472b6; color: white; }
        .tab-morado.active { background: #a78bfa !important; border-color: #a78bfa; color: white; }
        .tab-verde.active { background: #34d399 !important; border-color: #34d399; color: #0d1117; }
        .tab-azul.active { background: #60a5fa !important; border-color: #60a5fa; color: white; }
        .tab-amarillo.active { background: #fbbf24 !important; border-color: #fbbf24; color: #0d1117; }
        .tab-naranja.active { background: #fb923c !important; border-color: #fb923c; color: white; }

        /* Quiz Container */
        #quiz-section { width: 100%; max-width: 850px; }

        .question-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 6px solid var(--theme-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            animation: fadeIn 0.5s ease-out;
        }

        .question-text { font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; line-height: 1.4; }

        .options-grid { display: grid; gap: 12px; }

        .option-btn {
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 15px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
            width: 100%;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--theme-color); background: #1c2128; }

        /* Feedback Visual */
        .correct { background-color: var(--success) !important; color: white !important; border-color: var(--success) !important; font-weight: bold; }
        .incorrect { background-color: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        /* Resultados */
        #results-section { display: none; text-align: center; width: 100%; }

        .circle-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
        }

        svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: var(--border); stroke-width: 20; }
        .circle-progress {
            fill: none;
            stroke-width: 20;
            stroke-linecap: round;
            stroke-dasharray: 565.48;
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 1.5s ease-in-out, stroke 0.5s;
        }

        .score-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 800;
        }

        .quote {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 25px 0;
            color: var(--accent);
            padding: 20px;
            background: var(--card-bg);
            border-radius: 10px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .finish-btn {
            background-color: var(--theme-color);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            margin: 40px auto;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Cargar Tema y configurar Interfaz
        function loadTheme(themeId, btn, color) {
            currentThemeId = themeId;
            score = 0;
            answeredCount = 0;
            
            // Estilos dinámicos
            document.documentElement.style.setProperty('--theme-color', color);
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('theme-display-title').innerText = btn.innerText.split('\n')[0];
            document.getElementById('quiz-section').style.display = 'block';
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('btn-finalizar').style.display = 'none';

            // Aleatorizar y Renderizar
            currentQuestions = shuffle([...quizData[themeId]]);
            renderQuestions();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            currentQuestions.forEach((item, qIdx) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                    <div class="question-text">${qIdx + 1}. ${item.q}</div>
                    <div class="options-grid" id="q-${qIdx}">
                        ${item.a.map((opt, oIdx) => `
                            <button class="option-btn" onclick="checkAnswer(this, ${qIdx}, ${oIdx}, ${item.c})">
                                ${String.fromCharCode(65 + oIdx)}) ${opt}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function checkAnswer(btn, qIdx, oIdx, correctIdx) {
            const options = document.getElementById(`q-${qIdx}`).querySelectorAll('.option-btn');
            
            if (oIdx === correctIdx) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('incorrect');
                options[correctIdx].classList.add('correct'); // Mostrar la correcta
            }

            // Bloquear opciones
            options.forEach(b => b.disabled = true);
            answeredCount++;

            // Mostrar botón finalizar al terminar todas
            if (answeredCount === currentQuestions.length) {
                document.getElementById('btn-finalizar').style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }

        function showResults() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('results-section').style.display = 'block';
            
            const total = currentQuestions.length;
            const percent = (score / total) * 100;
            const circle = document.getElementById('progress-bar');
            const scoreDisplay = document.getElementById('score-display');
            const quoteEl = document.getElementById('result-quote');

            scoreDisplay.innerText = `${score}/${total}`;
            
            // Animación del Círculo (Circunferencia 565.48)
            const offset = 565.48 - (percent / 100) * 565.48;
            circle.style.strokeDashoffset = offset;
            circle.style.stroke = percent >= 50 ? 'var(--success)' : 'var(--error)';

            // Frases ingeniosas según resultado
const quotes = {
    t1: percent >= 50 ? "¡Arquitecto de Sistemas! Tu infraestructura es redundante y segura." : "Error de segmentación: Tu arquitectura necesita un refactor completo.",
    t2: percent >= 50 ? "¡WordPress Master! Has dominado el Loop y el wp-config." : "Error 500: Fallo crítico al cargar el conocimiento de WordPress.",
    php1: percent >= 50 ? "¡PHP Dev! Tu lógica es asíncrona y eficiente." : "Parse Error: Conocimiento no interpretado. Revisa la documentación.",
    php2: percent >= 50 ? "¡Lógica Pura! Has salido del bucle infinito con éxito." : "Bucle infinito detectado. Tu lógica ha entrado en stack overflow.",
    php3: percent >= 50 ? "¡Puntero de Arrays! Has indexado la información correctamente." : "Índice fuera de rango. Reasigna los punteros de tu memoria.",
    EX: percent >= 50 ? "¡CERTIFICACIÓN HACKCAT OBTENIDA! Eres un Senior Developer." : "Acceso Denegado. Se requiere inyección de conocimiento en el backend."
};

            quoteEl.innerText = quotes[currentThemeId] || "Análisis completado.";
            window.scrollTo(0,0);
        }

        // Carga inicial (Tema 1 Rosa)
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-rosa');
            loadTheme('t1', firstBtn, '#f472b6');
        };
    </script>
</body>
</html>
